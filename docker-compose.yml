version: '3.8'

volumes:
  db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/hoshimi/data/stock_data

services:
  analyzer:
    build:
      context: .
      dockerfile: analyzer/cpp/Dockerfile
      additional_contexts:
        grpc: /home/hoshimi/data/grpc
    ports:
      - "3881:3881"
    volumes:
      - db_data:/data
    environment:
      - DB_PATH=/data/stocks.db
      - GRPC_PORT=3881
    restart: unless-stopped

  ui_api_gateway:
    build: ./ui_api_gateway
    ports:
      - "6330:8080"
    volumes:
      - db_data:/data
    environment:
      - DB_PATH=/data/stocks.db
      - PORT=8080
      - DATA_SERVER_BASE=http://stock-analyzer-apiserver:3881
